
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CredDrive - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    header {
      background: #1e293b;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 20px; font-weight: 800; }
    header .info { color: #94a3b8; font-size: 13px; margin-top: 2px; }
    .sair {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }
    .sair:hover { background: #dc2626; }
    .content { padding: 32px; }
    .cards { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 24px 28px;
      flex: 1;
      min-width: 160px;
    }
    .card h2 { font-size: 30px; font-weight: 800; }
    .card p { color: #94a3b8; font-size: 13px; margin-top: 6px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #f1f5f9;
    }
    .tabela-wrap { overflow-x: auto; border-radius: 14px; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; }
    th {
      background: #334155;
      padding: 14px 20px;
      text-align: left;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td { padding: 14px 20px; border-top: 1px solid #334155; font-size: 14px; }
    .badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
    }
    .aprovado  { background: #14532d; color: #86efac; }
    .pendente  { background: #78350f; color: #fde68a; }
    .rejeitado { background: #7f1d1d; color: #fca5a5; }
    .processando { background: #1e3a5f; color: #93c5fd; }
    .empty { text-align: center; color: #64748b; padding: 40px; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>💳 CredDrive Admin</h1>
      <div class="info">admin@creddrive.com</div>
    </div>
    <button class="sair" onclick="sair()">Sair</button>
  </header>

  <div class="content">
    <div class="cards">
      <div class="card">
        <h2 id="total">—</h2>
        <p>Total de Pagamentos</p>
      </div>
      <div class="card">
        <h2 id="volume">—</h2>
        <p>Volume Total</p>
      </div>
      <div class="card">
        <h2 id="aprovados">—</h2>
        <p>Aprovados</p>
      </div>
    </div>

    <div class="section-title">Últimos Pagamentos</div>
    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Pagador</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr><td colspan="6" class="empty">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function carregarDados() {
      try {
        const res  = await fetch('/pagamentos');
        const data = await res.json();
        const lista = data.pagamentos || [];

        document.getElementById('total').textContent = lista.length;

        const volume = lista.reduce((acc, p) => acc + (p.valor || 0), 0);
        document.getElementById('volume').textContent =
          'R$ ' + volume.toFixed(2).replace('.', ',');

        const aprovados = lista.filter(p => p.status === 'aprovado').length;
        document.getElementById('aprovados').textContent = aprovados;

        const tabela = document.getElementById('tabela');
        if (lista.length === 0) {
          tabela.innerHTML = '<tr><td colspan="6" class="empty">Nenhum pagamento encontrado.</td></tr>';
          return;
        }

        tabela.innerHTML = lista.map(p => `
          <tr>
            <td style="color:#94a3b8;font-size:12px;font-family:monospace">${p._id.slice(-6).toUpperCase()}</td>
            <td style="text-transform:uppercase;font-size:12px;font-weight:700">${p.tipo}</td>
            <td style="color:#cbd5e1">${p.pagador_nome || p.pagador_email || '—'}</td>
            <td style="color:#34d399;font-weight:700">R$ ${(p.valor || 0).toFixed(2).replace('.', ',')}</td>
            <td><span class="badge ${p.status || 'pendente'}">${p.status || 'pendente'}</span></td>
            <td style="color:#64748b;font-size:13px">${p.criado_em ? new Date(p.criado_em).toLocaleDateString('pt-BR') : '—'}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('tabela').innerHTML =
          '<tr><td colspan="6" class="empty" style="color:#ef4444">Erro ao carregar dados.</td></tr>';
      }
    }

    function sair() {
      if (confirm('Deseja sair do painel admin?')) {
        window.location.href = '/';
      }
    }

    carregarDados();
  </script>
</body>
</html>
